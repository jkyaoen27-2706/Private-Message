<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatSphere - Professional Messaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, onChildAdded, update, get, remove, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo-W9TeZLT46lfTA5c-6QoUEuhVA5uRH8",
            authDomain: "my-awesome-project-26000.firebaseapp.com",
            databaseURL: "https://my-awesome-project-26000-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-awesome-project-26000",
            storageBucket: "my-awesome-project-26000.firebasestorage.app",
            messagingSenderId: "235513564859",
            appId: "1:235513564859:web:07794f4906cf649a2a239e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.firebaseApp = app;
        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseRefs = { ref, set, push, onValue, onChildAdded, update, get, remove, off };
        window.firebaseAuthFns = { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * { font-family: 'Inter', sans-serif; }
        
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-strong {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .message-bubble {
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .slide-up {
            animation: slideUp 0.4s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.8); }
        }
        
        .typing-dot {
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .status-online {
            box-shadow: 0 0 0 2px #1a1a2e, 0 0 0 4px #10b981;
        }
        
        .status-offline {
            box-shadow: 0 0 0 2px #1a1a2e, 0 0 0 4px #6b7280;
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white overflow-hidden">

    <!-- Auth Screen -->
    <div id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="relative w-full max-w-md slide-up">
            <div class="glass-strong rounded-3xl p-8 shadow-2xl">
                <div class="text-center mb-8">
                    <div class="w-20 h-20 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center pulse-glow">
                        <i class="fas fa-comments text-3xl"></i>
                    </div>
                    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-300">ChatSphere</h1>
                    <p class="text-gray-400 mt-2">Connect. Communicate. Collaborate.</p>
                </div>

                <div class="flex mb-6 bg-black/20 rounded-xl p-1">
                    <button onclick="switchAuthMode('login')" id="loginTab" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all bg-white/10 text-white shadow-lg">Sign In</button>
                    <button onclick="switchAuthMode('register')" id="registerTab" class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white">Create Account</button>
                </div>

                <form id="authForm" class="space-y-4">
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="email" id="authEmail" placeholder="Email address" class="w-full bg-black/20 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" required>
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="authPassword" placeholder="Password" class="w-full bg-black/20 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" required>
                    </div>
                    <div id="nameField" class="relative hidden">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="authName" placeholder="Display Name" class="w-full bg-black/20 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
                    </div>
                    <button type="submit" id="authSubmitBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold py-3.5 rounded-xl shadow-lg hover:shadow-indigo-500/25 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        Sign In
                    </button>
                </form>

                <div id="authError" class="mt-4 text-red-400 text-sm text-center hidden"></div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden fixed inset-0 flex">
        <!-- Sidebar -->
        <div class="w-80 glass-strong flex flex-col border-r border-white/10">
            <!-- User Profile Header -->
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3 mb-4">
                    <div class="relative">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-pink-500 to-orange-400 flex items-center justify-center text-lg font-bold" id="userAvatar">
                            U
                        </div>
                        <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 rounded-full border-2 border-[#1a1a2e]"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-white truncate" id="userName">User</h3>
                        <p class="text-xs text-green-400">Online</p>
                    </div>
                    <button onclick="logout()" class="p-2 hover:bg-white/10 rounded-lg transition-colors text-gray-400 hover:text-red-400">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Search chats..." class="w-full bg-black/20 border border-white/10 rounded-xl py-2 pl-9 pr-4 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition-all">
                </div>
            </div>

            <!-- Navigation Tabs -->
            <div class="flex border-b border-white/10">
                <button onclick="switchTab('chats')" id="tabChats" class="flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 transition-all">
                    <i class="fas fa-comment-dots mr-2"></i>Chats
                </button>
                <button onclick="switchTab('users')" id="tabUsers" class="flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white transition-all">
                    <i class="fas fa-users mr-2"></i>Users
                </button>
                <button onclick="switchTab('groups')" id="tabGroups" class="flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white transition-all">
                    <i class="fas fa-user-group mr-2"></i>Groups
                </button>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-3" id="sidebarContent">
                <!-- Dynamic content loaded here -->
            </div>

            <!-- Create Group Button -->
            <div class="p-4 border-t border-white/10">
                <button onclick="openCreateGroupModal()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-medium py-3 rounded-xl shadow-lg hover:shadow-indigo-500/25 transition-all transform hover:scale-[1.02] flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> Create Group
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col relative" id="chatArea">
            <!-- Empty State -->
            <div id="emptyChat" class="flex-1 flex items-center justify-center">
                <div class="text-center">
                    <div class="w-32 h-32 mx-auto mb-6 rounded-full bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center">
                        <i class="fas fa-paper-plane text-5xl text-indigo-400/50"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-white/80 mb-2">Welcome to ChatSphere</h2>
                    <p class="text-gray-400">Select a chat or group to start messaging</p>
                </div>
            </div>

            <!-- Active Chat -->
            <div id="activeChat" class="hidden flex-col h-full">
                <!-- Chat Header -->
                <div class="glass-strong px-6 py-4 border-b border-white/10 flex items-center gap-4">
                    <div class="relative">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center font-bold text-sm" id="chatAvatar">
                            G
                        </div>
                        <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-[#1a1a2e]" id="chatStatus"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-white truncate" id="chatTitle">Group Name</h3>
                        <p class="text-xs text-gray-400" id="chatSubtitle">Members</p>
                    </div>
                    <div class="flex items-center gap-2" id="chatActions">
                        <button onclick="openInviteModal()" id="inviteBtn" class="hidden p-2 hover:bg-white/10 rounded-lg transition-colors text-gray-400 hover:text-white" title="Invite Members">
                            <i class="fas fa-user-plus"></i>
                        </button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-4" id="messagesContainer">
                    <!-- Messages loaded here -->
                </div>

                <!-- Input Area -->
                <div class="glass-strong p-4 border-t border-white/10">
                    <form id="messageForm" class="flex items-center gap-3">
                        <button type="button" class="p-3 hover:bg-white/10 rounded-xl transition-colors text-gray-400 hover:text-white">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <div class="flex-1 relative">
                            <input type="text" id="messageInput" placeholder="Type a message..." class="w-full bg-black/20 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        </div>
                        <button type="button" class="p-3 hover:bg-white/10 rounded-xl transition-colors text-gray-400 hover:text-white">
                            <i class="fas fa-smile"></i>
                        </button>
                        <button type="submit" class="p-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 rounded-xl shadow-lg transition-all transform hover:scale-110 active:scale-95">
                            <i class="fas fa-paper-plane text-white"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="createGroupModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeCreateGroupModal()"></div>
        <div class="relative w-full max-w-lg glass-strong rounded-3xl p-6 shadow-2xl slide-up">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">Create New Group</h2>
                <button onclick="closeCreateGroupModal()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="createGroupForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Group Name</label>
                    <input type="text" id="groupName" placeholder="Enter group name" class="w-full bg-black/20 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition-all" required>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Description</label>
                    <textarea id="groupDesc" placeholder="What's this group about?" rows="3" class="w-full bg-black/20 border border-white/10 rounded-xl py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 transition-all resize-none"></textarea>
                </div>
                
                <div>
                    <label class="block text-sm text-gray-400 mb-3">Privacy Setting</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="groupPrivacy" value="public" class="hidden peer" checked>
                            <div class="p-4 rounded-xl border border-white/10 bg-black/20 peer-checked:border-indigo-500 peer-checked:bg-indigo-500/20 transition-all hover:bg-white/5">
                                <div class="flex items-center gap-3 mb-2">
                                    <i class="fas fa-globe text-indigo-400 text-xl"></i>
                                    <span class="font-medium">Public</span>
                                </div>
                                <p class="text-xs text-gray-400">Anyone can find and join this group</p>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="groupPrivacy" value="private" class="hidden peer">
                            <div class="p-4 rounded-xl border border-white/10 bg-black/20 peer-checked:border-purple-500 peer-checked:bg-purple-500/20 transition-all hover:bg-white/5">
                                <div class="flex items-center gap-3 mb-2">
                                    <i class="fas fa-lock text-purple-400 text-xl"></i>
                                    <span class="font-medium">Private</span>
                                </div>
                                <p class="text-xs text-gray-400">Only you can invite members</p>
                            </div>
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold py-3.5 rounded-xl shadow-lg hover:shadow-indigo-500/25 transition-all transform hover:scale-[1.02] mt-4">
                    Create Group
                </button>
            </form>
        </div>
    </div>

    <!-- Invite Modal -->
    <div id="inviteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeInviteModal()"></div>
        <div class="relative w-full max-w-md glass-strong rounded-3xl p-6 shadow-2xl slide-up">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold">Invite Members</h2>
                <button onclick="closeInviteModal()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="inviteList" class="space-y-2 max-h-80 overflow-y-auto custom-scrollbar">
                <!-- Users to invite -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="glass-strong px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 border-l-4 border-indigo-500">
            <i class="fas fa-check-circle text-indigo-400"></i>
            <span id="toastMessage" class="text-sm font-medium">Notification</span>
        </div>
    </div>

    <script type="module">
        const { ref, set, push, onValue, onChildAdded, update, get, remove, off } = window.firebaseRefs;
        const { createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } = window.firebaseAuthFns;
        
        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let messagesListener = null;
        let sidebarListener = null;
        let users = {};
        let groups = {};
        let activeTab = 'chats';
        let authMode = 'login';

        // Auth State
        onAuthStateChanged(window.firebaseAuth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                
                const userRef = ref(window.firebaseDb, `users/${user.uid}`);
                const snapshot = await get(userRef);
                
                if (!snapshot.exists()) {
                    const name = document.getElementById('authName').value || user.email.split('@')[0];
                    await set(userRef, {
                        email: user.email,
                        name: name,
                        status: 'online',
                        lastSeen: Date.now(),
                        createdAt: Date.now()
                    });
                    await updateProfile(user, { displayName: name });
                } else {
                    await update(userRef, { status: 'online', lastSeen: Date.now() });
                }
                
                const userData = (await get(userRef)).val();
                document.getElementById('userName').textContent = userData.name || user.email.split('@')[0];
                document.getElementById('userAvatar').textContent = (userData.name || user.email).charAt(0).toUpperCase();
                
                setupListeners();
            } else {
                currentUser = null;
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
                cleanupListeners();
            }
        });

        function setupListeners() {
            // Users listener
            const usersRef = ref(window.firebaseDb, 'users');
            onValue(usersRef, (snapshot) => {
                users = snapshot.val() || {};
                refreshSidebar();
            });

            // Groups listener
            const groupsRef = ref(window.firebaseDb, 'groups');
            onValue(groupsRef, (snapshot) => {
                groups = snapshot.val() || {};
                refreshSidebar();
            });
        }

        function cleanupListeners() {
            if (sidebarListener) off(sidebarListener);
            if (messagesListener) off(messagesListener);
        }

        function refreshSidebar() {
            if (activeTab === 'chats') renderChats();
            else if (activeTab === 'users') renderUsers();
            else if (activeTab === 'groups') renderGroups();
        }

        // Auth Form
        window.switchAuthMode = (mode) => {
            authMode = mode;
            document.getElementById('loginTab').className = mode === 'login' ? 'flex-1 py-2.5 rounded-lg text-sm font-medium transition-all bg-white/10 text-white shadow-lg' : 'flex-1 py-2.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white';
            document.getElementById('registerTab').className = mode === 'register' ? 'flex-1 py-2.5 rounded-lg text-sm font-medium transition-all bg-white/10 text-white shadow-lg' : 'flex-1 py-2.5 rounded-lg text-sm font-medium transition-all text-gray-400 hover:text-white';
            document.getElementById('nameField').classList.toggle('hidden', mode === 'login');
            document.getElementById('authSubmitBtn').textContent = mode === 'login' ? 'Sign In' : 'Create Account';
            document.getElementById('authError').classList.add('hidden');
        };

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const errorDiv = document.getElementById('authError');
            
            try {
                if (authMode === 'login') {
                    await signInWithEmailAndPassword(window.firebaseAuth, email, password);
                } else {
                    const name = document.getElementById('authName').value;
                    if (!name) {
                        errorDiv.textContent = 'Please enter a display name';
                        errorDiv.classList.remove('hidden');
                        return;
                    }
                    await createUserWithEmailAndPassword(window.firebaseAuth, email, password);
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('hidden');
            }
        });

        window.logout = async () => {
            if (currentUser) {
                await update(ref(window.firebaseDb, `users/${currentUser.uid}`), { status: 'offline', lastSeen: Date.now() });
            }
            await signOut(window.firebaseAuth);
            currentChat = null;
            currentChatType = null;
            document.getElementById('emptyChat').classList.remove('hidden');
            document.getElementById('activeChat').classList.add('hidden');
            document.getElementById('activeChat').classList.remove('flex');
        };

        // Render Functions
        window.switchTab = (tab) => {
            activeTab = tab;
            document.getElementById('tabChats').className = tab === 'chats' ? 'flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 transition-all' : 'flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white transition-all';
            document.getElementById('tabUsers').className = tab === 'users' ? 'flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 transition-all' : 'flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white transition-all';
            document.getElementById('tabGroups').className = tab === 'groups' ? 'flex-1 py-3 text-sm font-medium text-indigo-400 border-b-2 border-indigo-500 transition-all' : 'flex-1 py-3 text-sm font-medium text-gray-400 hover:text-white transition-all';
            refreshSidebar();
        };

        function renderChats() {
            const container = document.getElementById('sidebarContent');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let html = '';
            
            // Get user chats for last message
            const chatsRef = ref(window.firebaseDb, `userChats/${currentUser.uid}`);
            
            onValue(chatsRef, (snapshot) => {
                const userChats = snapshot.val() || {};
                let hasContent = false;
                
                // Direct messages
                Object.entries(users).forEach(([uid, user]) => {
                    if (uid === currentUser.uid) return;
                    if (search && !user.name?.toLowerCase().includes(search) && !user.email?.toLowerCase().includes(search)) return;
                    
                    const chatId = [currentUser.uid, uid].sort().join('_');
                    const lastMsg = userChats[chatId]?.lastMessage;
                    
                    html += `
                        <div onclick="openChat('${uid}', 'direct')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all hover-lift group ${currentChat === uid && currentChatType === 'direct' ? 'bg-white/10 border border-white/10' : ''}">
                            <div class="relative">
                                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-bold text-sm">
                                    ${user.name?.charAt(0).toUpperCase() || 'U'}
                                </div>
                                <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#1a1a2e] ${user.status === 'online' ? 'bg-green-500' : 'bg-gray-500'}"></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between">
                                    <h4 class="font-medium text-white truncate">${user.name || user.email}</h4>
                                    ${lastMsg ? `<span class="text-xs text-gray-500">${formatTime(lastMsg.timestamp)}</span>` : ''}
                                </div>
                                <p class="text-sm text-gray-400 truncate">${lastMsg ? lastMsg.text : 'Start a conversation...'}</p>
                            </div>
                        </div>
                    `;
                    hasContent = true;
                });

                // Group messages (joined groups)
                Object.entries(groups).forEach(([gid, group]) => {
                    if (!group.members?.[currentUser.uid]) return;
                    if (search && !group.name?.toLowerCase().includes(search)) return;
                    
                    const lastMsg = userChats[gid]?.lastMessage;
                    
                    html += `
                        <div onclick="openChat('${gid}', 'group')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all hover-lift group ${currentChat === gid && currentChatType === 'group' ? 'bg-white/10 border border-white/10' : ''}">
                            <div class="relative">
                                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center font-bold text-sm">
                                    ${group.name?.charAt(0).toUpperCase() || 'G'}
                                </div>
                                ${group.privacy === 'private' ? '<div class="absolute -top-1 -right-1 w-4 h-4 bg-purple-500 rounded-full flex items-center justify-center text-[8px]"><i class="fas fa-lock"></i></div>' : ''}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between">
                                    <h4 class="font-medium text-white truncate">${group.name}</h4>
                                    ${lastMsg ? `<span class="text-xs text-gray-500">${formatTime(lastMsg.timestamp)}</span>` : ''}
                                </div>
                                <p class="text-sm text-gray-400 truncate">${lastMsg ? lastMsg.text : 'No messages yet...'}</p>
                            </div>
                        </div>
                    `;
                    hasContent = true;
                });

                if (!hasContent) {
                    html = `
                        <div class="text-center py-10">
                            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-white/5 flex items-center justify-center">
                                <i class="fas fa-comment-slash text-2xl text-gray-500"></i>
                            </div>
                            <p class="text-gray-500 text-sm">No chats yet</p>
                            <p class="text-gray-600 text-xs mt-1">Start messaging or join a group</p>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
            });
        }

        function renderUsers() {
            const container = document.getElementById('sidebarContent');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let html = '<div class="space-y-1">';
            
            Object.entries(users).forEach(([uid, user]) => {
                if (uid === currentUser.uid) return;
                if (search && !user.name?.toLowerCase().includes(search) && !user.email?.toLowerCase().includes(search)) return;
                
                html += `
                    <div onclick="openChat('${uid}', 'direct')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all hover-lift">
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center font-bold text-sm">
                                ${user.name?.charAt(0).toUpperCase() || 'U'}
                            </div>
                            <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#1a1a2e] ${user.status === 'online' ? 'bg-green-500' : 'bg-gray-500'}"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-medium text-white">${user.name || user.email}</h4>
                            <p class="text-xs text-gray-400">${user.email}</p>
                        </div>
                        <button class="p-2 hover:bg-white/10 rounded-lg transition-colors text-indigo-400">
                            <i class="fas fa-comment"></i>
                        </button>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        function renderGroups() {
            const container = document.getElementById('sidebarContent');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let html = '<div class="space-y-3">';
            
            // My Groups
            html += '<div class="px-2 py-1 text-xs font-semibold text-gray-500 uppercase tracking-wider">My Groups</div>';
            let hasMyGroups = false;
            
            Object.entries(groups).forEach(([gid, group]) => {
                if (!group.members?.[currentUser.uid]) return;
                if (search && !group.name?.toLowerCase().includes(search)) return;
                hasMyGroups = true;
                
                const memberCount = Object.keys(group.members || {}).length;
                
                html += `
                    <div onclick="openChat('${gid}', 'group')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all hover-lift ${currentChat === gid && currentChatType === 'group' ? 'bg-white/10 border border-white/10' : ''}">
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center font-bold text-sm">
                                ${group.name?.charAt(0).toUpperCase() || 'G'}
                            </div>
                            ${group.privacy === 'private' ? '<div class="absolute -top-1 -right-1 w-4 h-4 bg-purple-500 rounded-full flex items-center justify-center text-[8px]"><i class="fas fa-lock"></i></div>' : ''}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-medium text-white">${group.name}</h4>
                            <p class="text-xs text-gray-400">${memberCount} members • ${group.privacy}</p>
                        </div>
                        ${group.owner === currentUser.uid ? '<span class="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-[10px] rounded-full font-medium">Owner</span>' : ''}
                    </div>
                `;
            });
            
            if (!hasMyGroups) {
                html += '<div class="px-2 py-4 text-center text-sm text-gray-500">No groups yet</div>';
            }
            
            // Public Groups
            html += '<div class="px-2 py-1 mt-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Public Groups</div>';
            let hasPublic = false;
            
            Object.entries(groups).forEach(([gid, group]) => {
                if (group.privacy !== 'public' || group.members?.[currentUser.uid]) return;
                if (search && !group.name?.toLowerCase().includes(search)) return;
                hasPublic = true;
                
                const memberCount = Object.keys(group.members || {}).length;
                
                html += `
                    <div onclick="joinGroup('${gid}')" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-all hover-lift border border-dashed border-white/10">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-400 to-indigo-500 flex items-center justify-center font-bold text-sm opacity-70">
                            ${group.name?.charAt(0).toUpperCase() || 'G'}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-medium text-white/80">${group.name}</h4>
                            <p class="text-xs text-gray-500">${memberCount} members • Public</p>
                        </div>
                        <span class="px-3 py-1 bg-indigo-500/20 text-indigo-400 text-xs rounded-lg font-medium hover:bg-indigo-500/30 transition-colors">Join</span>
                    </div>
                `;
            });
            
            if (!hasPublic) {
                html += '<div class="px-2 py-4 text-center text-sm text-gray-500">No public groups available</div>';
            }
            
            html += '</div>';
            container.innerHTML = html;
        }

        function formatTime(timestamp) {
            if (!timestamp) return '';
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)}h`;
            return `${Math.floor(diff / 86400000)}d`;
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', () => {
            refreshSidebar();
        });

        // Chat Functions
        window.openChat = async (id, type) => {
            currentChat = id;
            currentChatType = type;
            
            document.getElementById('emptyChat').classList.add('hidden');
            document.getElementById('activeChat').classList.remove('hidden');
            document.getElementById('activeChat').classList.add('flex');
            
            if (type === 'direct') {
                const user = users[id];
                document.getElementById('chatTitle').textContent = user.name || user.email;
                document.getElementById('chatSubtitle').textContent = user.status === 'online' ? 'Online' : 'Offline';
                document.getElementById('chatAvatar').textContent = user.name?.charAt(0).toUpperCase() || 'U';
                document.getElementById('chatStatus').className = `absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-[#1a1a2e] ${user.status === 'online' ? 'bg-green-500' : 'bg-gray-500'}`;
                document.getElementById('inviteBtn').classList.add('hidden');
            } else {
                const group = groups[id];
                document.getElementById('chatTitle').textContent = group.name;
                const memberCount = Object.keys(group.members || {}).length;
                document.getElementById('chatSubtitle').textContent = `${memberCount} members • ${group.privacy}`;
                document.getElementById('chatAvatar').textContent = group.name?.charAt(0).toUpperCase() || 'G';
                document.getElementById('chatStatus').className = 'absolute bottom-0 right-0 w-3 h-3 bg-indigo-500 rounded-full border-2 border-[#1a1a2e]';
                
                // Show invite button only for private group owners
                if (group.owner === currentUser.uid && group.privacy === 'private') {
                    document.getElementById('inviteBtn').classList.remove('hidden');
                } else {
                    document.getElementById('inviteBtn').classList.add('hidden');
                }
            }
            
            loadMessages();
            refreshSidebar();
        };

        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            if (messagesListener) {
                // Remove previous listener
                const oldPath = messagesListener.path;
                off(ref(window.firebaseDb, oldPath));
            }
            
            let path;
            if (currentChatType === 'direct') {
                path = `messages/${[currentUser.uid, currentChat].sort().join('_')}`;
            } else {
                path = `groupMessages/${currentChat}`;
            }
            
            messagesListener = { path: path };
            
            const msgRef = ref(window.firebaseDb, path);
            onChildAdded(msgRef, (snapshot) => {
                const msg = snapshot.val();
                if (!msg) return;
                
                const isMe = msg.sender === currentUser.uid;
                const sender = users[msg.sender];
                
                const div = document.createElement('div');
                div.className = `flex ${isMe ? 'justify-end' : 'justify-start'} message-bubble`;
                div.innerHTML = `
                    <div class="max-w-[70%] ${isMe ? 'bg-gradient-to-r from-indigo-600 to-purple-600' : 'glass'} rounded-2xl px-5 py-3 shadow-lg">
                        ${!isMe && currentChatType === 'group' ? `<div class="text-xs text-indigo-300 mb-1 font-medium">${sender?.name || 'Unknown'}</div>` : ''}
                        <p class="text-sm text-white leading-relaxed">${escapeHtml(msg.text)}</p>
                        <div class="flex items-center justify-end gap-1 mt-1.5">
                            <span class="text-[10px] text-white/60">${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            ${isMe ? '<i class="fas fa-check-double text-[10px] text-blue-300"></i>' : ''}
                        </div>
                    </div>
                `;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            });
        }

        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            input.value = '';
            
            let path;
            if (currentChatType === 'direct') {
                path = `messages/${[currentUser.uid, currentChat].sort().join('_')}`;
            } else {
                path = `groupMessages/${currentChat}`;
            }
            
            const msgRef = push(ref(window.firebaseDb, path));
            await set(msgRef, {
                text: text,
                sender: currentUser.uid,
                timestamp: Date.now()
            });
            
            // Update last message for chat list
            const chatId = currentChatType === 'direct' ? [currentUser.uid, currentChat].sort().join('_') : currentChat;
            await update(ref(window.firebaseDb, `userChats/${currentUser.uid}/${chatId}`), {
                lastMessage: { text: text, timestamp: Date.now() }
            });
            
            if (currentChatType === 'direct') {
                await update(ref(window.firebaseDb, `userChats/${currentChat}/${chatId}`), {
                    lastMessage: { text: text, timestamp: Date.now() }
                });
            }
        });

        // Group Functions
        window.openCreateGroupModal = () => {
            document.getElementById('createGroupModal').classList.remove('hidden');
        };

        window.closeCreateGroupModal = () => {
            document.getElementById('createGroupModal').classList.add('hidden');
            document.getElementById('createGroupForm').reset();
        };

        document.getElementById('createGroupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('groupName').value;
            const desc = document.getElementById('groupDesc').value;
            const privacy = document.querySelector('input[name="groupPrivacy"]:checked').value;
            
            const groupRef = push(ref(window.firebaseDb, 'groups'));
            await set(groupRef, {
                name: name,
                description: desc,
                privacy: privacy,
                owner: currentUser.uid,
                members: { [currentUser.uid]: true },
                createdAt: Date.now()
            });
            
            closeCreateGroupModal();
            showToast('Group created successfully!');
            if (activeTab === 'groups') renderGroups();
        });

        window.joinGroup = async (groupId) => {
            const group = groups[groupId];
            if (!group) return;
            
            if (group.privacy === 'private') {
                showToast('This is a private group. Only the owner can invite you.', 'error');
                return;
            }
            
            await update(ref(window.firebaseDb, `groups/${groupId}/members`), {
                [currentUser.uid]: true
            });
            
            showToast(`Joined ${group.name}!`);
            refreshSidebar();
        };

        // Invite Modal
        window.openInviteModal = () => {
            if (!currentChat || currentChatType !== 'group') return;
            const group = groups[currentChat];
            if (group.owner !== currentUser.uid) {
                showToast('Only the owner can invite members', 'error');
                return;
            }
            
            document.getElementById('inviteModal').classList.remove('hidden');
            const list = document.getElementById('inviteList');
            let html = '';
            
            Object.entries(users).forEach(([uid, user]) => {
                if (uid === currentUser.uid || group.members?.[uid]) return;
                
                html += `
                    <div class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 fade-in">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center font-bold text-sm">
                                ${user.name?.charAt(0).toUpperCase() || 'U'}
                            </div>
                            <div>
                                <div class="font-medium text-sm">${user.name || user.email}</div>
                                <div class="text-xs text-gray-500">${user.email}</div>
                            </div>
                        </div>
                        <button onclick="inviteUser('${uid}')" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm font-medium transition-colors">
                            Invite
                        </button>
                    </div>
                `;
            });
            
            if (!html) html = '<div class="text-center py-8 text-gray-500">All users are already members</div>';
            list.innerHTML = html;
        };

        window.closeInviteModal = () => {
            document.getElementById('inviteModal').classList.add('hidden');
        };

        window.inviteUser = async (uid) => {
            await update(ref(window.firebaseDb, `groups/${currentChat}/members`), {
                [uid]: true
            });
            showToast('User invited successfully!');
            closeInviteModal();
        };

        // Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            const div = toast.querySelector('div');
            
            msgEl.textContent = message;
            if (type === 'error') {
                icon.className = 'fas fa-exclamation-circle text-red-400';
                div.classList.remove('border-indigo-500');
                div.classList.add('border-red-500');
            } else {
                icon.className = 'fas fa-check-circle text-indigo-400';
                div.classList.remove('border-red-500');
                div.classList.add('border-indigo-500');
            }
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        window.switchAuthMode('login');
    </script>
</body>
</html>
